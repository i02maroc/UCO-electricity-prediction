name: electricity-prediction
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.19
  - pandas=2.3.3
  - matplotlib=3.10.6
  - scikit-learn=1.7.2
  - joblib=1.5.2
  
  # Drivers activar la GPU en Windows
  - cudatoolkit=11.2.2
  - cudnn=8.1.0.77
  
  - pip:
      # Versiones exactas en ambos .yml
      - numpy==1.24.3
      - tensorflow==2.10.1    # 2.10 para mantener la GPU activa
      - meteostat
      - statsmodels             